name: CI

on:
  pull_request:
    branches: ["dev", "main"]
  push:
    branches: ["dev", "main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Database migration and seed test
        run: npm run test:db

      - name: E2E core flow tests (main)
        if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm run audit:ci
